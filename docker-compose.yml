# ============================================================================
# NegotiateAI — Docker Compose (production)
#
# Deploiement sur le meme VPS que Batiscan V4.
# Se branche sur le reseau batiscan-network existant pour que Caddy
# puisse router negotiateia.batiscan.ch → ce container.
#
# Usage :
#   cp .env.example .env          # Configurer ANTHROPIC_API_KEY
#   docker compose up -d --build  # Demarrer
#   docker compose logs -f        # Suivre les logs
# ============================================================================

services:

  # ── NegotiateAI (Node.js) ──────────────────────────────────────────────────
  negotiateai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: negotiateai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      NEGOTIATE_AI_DATA_DIR: /data
    volumes:
      - negotiateai_data:/data
    networks:
      - batiscan-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ── Volume persistant (sessions + progression) ────────────────────────────
volumes:
  negotiateai_data:
    driver: local

# ── Reseau externe (cree par Batiscan V4) ─────────────────────────────────
networks:
  batiscan-network:
    external: true
    name: batiscan-v4_batiscan-network
